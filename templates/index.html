<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>보안 구역 인원 등록 시스템</title>
	<style>
		body {
			font-family: 'Malgun Gothic', sans-serif;
			background-color: #2c2f33;
			color: white;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
		}
		#loginScreen {
			background-color: #23272a;
			padding: 40px;
			border-radius: 10px;
			box-shadow: 0 4px 8px rgba(0,0,0,0.5);
			text-align: center;
			width: 300px;
		}
		#loginScreen input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #555; border-radius: 5px; background-color: #333; color: white; }
		#loginScreen button { width: 100%; padding: 10px; background-color: #7289da; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 15px; }
		#loginScreen button:hover { background-color: #5b6eae; }
        
		#mainScreen { display: none; text-align: center; }
		video { border: 3px solid #7289da; border-radius: 10px; margin-bottom: 20px; background-color: #000; }
		.controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
		input[type="text"], select { padding: 10px; font-size: 16px; border-radius: 5px; border: none; }
        
		button.capture-btn {
			padding: 12px 24px; font-size: 16px; font-weight: bold; background-color: #43b581; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s;
		}
		button.capture-btn:hover { background-color: #3ca374; }

		/* 새 인원 등록 버튼 스타일 (초기엔 숨김) */
		button.reset-btn {
			padding: 12px 24px; font-size: 16px; font-weight: bold; background-color: #7289da; color: white; border: none; border-radius: 5px; cursor: pointer; display: none; transition: 0.3s;
		}
		button.reset-btn:hover { background-color: #5b6eae; }
        
		#statusMessage { margin-top: 20px; font-size: 18px; font-weight: bold; }
		#instructionText { font-size: 22px; color: #43b581; margin-bottom: 15px; font-weight: bold; transition: color 0.3s; }
	</style>
</head>
<body>

	<div id="loginScreen">
		<h2>보안 관리자 로그인</h2>
		<input type="text" id="adminId" placeholder="아이디">
		<input type="password" id="adminPw" placeholder="비밀번호">
		<button onclick="checkLogin()">로그인</button>
		<div id="loginError" style="color: #f04747; margin-top: 10px; font-size: 14px;"></div>
	</div>

	<div id="mainScreen">
		<h2>보안 구역 인원 등록</h2>
		<div id="welcomeMessage" style="color: #7289da; font-size: 20px; font-weight: bold; margin-bottom: 20px;"></div>
        
		<div id="instructionText">📷 1단계: 카메라의 정면을 쳐다보세요</div>

		<img id="video" width="640" height="480" alt="카메라" style="border:3px solid #7289da; border-radius:10px; margin-bottom:20px; background:#000;">
		<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
        
		<div class="controls">
			<input type="text" id="nameInput" placeholder="이름 입력 (예: 홍길동)">
			<select id="groupSelect">
				<option value="허가">허가 (Allowed)</option>
				<option value="준허가">준허가 (Semi-Allowed)</option>
				<option value="비허가">비허가 (Denied)</option>
			</select>
		</div>
        
		<button class="capture-btn" id="captureBtn" onclick="captureAndSend()">정면 사진 찍기</button>
        
		<button class="reset-btn" id="resetBtn" onclick="resetForNewPerson()">🔄 다른 인원 새로 등록하기</button>

		<div id="statusMessage"></div>
	</div>

	<script>
		const video = document.getElementById('video');
		const canvas = document.getElementById('canvas');
		const instructionText = document.getElementById('instructionText');
		const statusMessage = document.getElementById('statusMessage');
		const nameInput = document.getElementById('nameInput');
		const captureBtn = document.getElementById('captureBtn');
		const resetBtn = document.getElementById('resetBtn');
        
		let currentStep = 1;

		// [1단계] 로그인 확인
		function checkLogin() {
			const id = document.getElementById('adminId').value;
			const pw = document.getElementById('adminPw').value;
			if (id === 'hkl9292' && pw === 'qwon4616!') {
				document.getElementById('loginScreen').style.display = 'none';
				document.getElementById('mainScreen').style.display = 'block';
				document.getElementById('welcomeMessage').innerText = "🎉 환영합니다, 관리자님!";
				startCamera();
			} else {
				document.getElementById('loginError').innerText = "❌ 아이디 또는 비밀번호가 일치하지 않습니다.";
			}
		}

		// 서버(RealSense) 카메라 원본 스냅샷을 폴링해서 표시
		function startCamera() {
			function refresh() {
				const next = new Image();
				next.onload = () => { video.src = next.src; };
				next.src = '/snapshot/raw?t=' + Date.now();
			}
			refresh();
			setInterval(refresh, 100);
		}

		// [3~5단계] 사진 촬영 및 서버 판별 로직
		function captureAndSend() {
			const name = nameInput.value.trim();
			const group = document.getElementById('groupSelect').value;

			// [2단계] 이름 입력 검증
			if (!name) { alert("이름을 먼저 입력해주세요!"); return; }

			statusMessage.style.color = "white";
			statusMessage.innerText = "서버로 전송 중... 판별 대기...";

			// 서버(RealSense) 카메라의 현재 원본 프레임으로 등록
			fetch('/api/register_capture', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ name: name, group: group })
			})
			.then(response => response.json())
			.then(data => {
				if (data.status === 'success') {
					// 정면 성공 -> 좌측면으로
					if (currentStep === 1 && data.message.includes('정면')) {
						currentStep = 2;
						instructionText.innerText = "📷 2단계: 우측 측면을 쳐다보세요";
						instructionText.style.color = "#faa61a";
						statusMessage.style.color = "#43b581";
						statusMessage.innerText = "✅ 정면 등록 완료! 고개를 돌리고 아래 버튼을 누르세요.";
						captureBtn.innerText = "좌측면 사진 찍기"; 
						captureBtn.style.backgroundColor = "#faa61a"; 
					} 
					// 좌측면 성공 -> 우측면으로
					else if (currentStep === 2 && data.message.includes('좌측면')) {
						currentStep = 3;
						instructionText.innerText = "📷 3단계: 좌측 측면을 쳐다보세요";
						instructionText.style.color = "#faa61a";
						statusMessage.style.color = "#43b581";
						statusMessage.innerText = "✅ 좌측면 등록 완료! 반대쪽으로 고개를 돌리고 아래 버튼을 누르세요.";
						captureBtn.innerText = "우측면 사진 찍기"; 
					} 
					// 우측면 성공 -> 완료 및 버튼 교체
					else if (currentStep === 3 && data.message.includes('우측면')) {
						currentStep = 4;
						instructionText.innerText = "🎉 모든 각도 등록이 완료되었습니다!";
						instructionText.style.color = "#7289da";
						statusMessage.style.color = "#43b581";
						statusMessage.innerText = "✅ 3가지 각도가 성공적으로 DB에 저장되었습니다.";
                        
						// ⭐️ 기존 촬영 버튼을 숨기고 '새 인원 등록' 버튼 표시 ⭐️
						captureBtn.style.display = "none";
						resetBtn.style.display = "inline-block";
					} 
					else {
						let expected = currentStep === 1 ? '정면' : (currentStep === 2 ? '좌측면' : '우측면');
						statusMessage.style.color = "#f04747";
						statusMessage.innerText = `⚠️ [주의] 현재 ${expected}을(를) 찍어야 합니다. 다시 찍어주세요!`;
					}
				} else {
					statusMessage.style.color = "#f04747";
					statusMessage.innerText = data.message;
				}
			})
			.catch(error => {
				statusMessage.style.color = "#f04747";
				statusMessage.innerText = "서버 통신 오류. 파이썬 서버가 켜져 있는지 확인하세요.";
			});
		}

		// ⭐️ [6단계] 초기화 및 루프 함수 ⭐️
		function resetForNewPerson() {
			// 1. 상태 변수 및 텍스트 초기화
			currentStep = 1;
			nameInput.value = "";
			instructionText.innerText = "📷 1단계: 카메라의 정면을 쳐다보세요";
			instructionText.style.color = "#43b581";
			statusMessage.innerText = "";
            
			// 2. 버튼 상태 원상 복구 (루프)
			resetBtn.style.display = "none";
			captureBtn.style.display = "inline-block";
			captureBtn.innerText = "정면 사진 찍기";
			captureBtn.style.backgroundColor = "#43b581";
            
			// 3. 커서를 이름 입력창으로 자동 이동 (편의성)
			nameInput.focus();
		}
	</script>
</body>
</html>
